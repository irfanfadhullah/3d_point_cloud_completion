# AnchorFormer Model Configuration
_base_: default.yaml

model:
  name: "AnchorFormer"
  config:
    trans_dim: 384
    num_pred: 6144
    num_query: 224  # Must match encoder output: 128 + depth*16 = 224
    num_encoder_blk: 6
    num_decoder_blk: 8
    sparse_expansion_lambda: 1.2
    dense_expansion_lambda: 1.2
    loss:
      sparse_loss_weight: 1.0
      dense_loss_weight: 1.0
      sparse_penalty_weight: 0.1
      dense_penalty_weight: 0.1

dataset:
  train: "ShapeNet"
  test: "ShapeNet"

train:
  batch_size: 16
  n_epochs: 400
  learning_rate: 0.001
  lr_decay: 150
  warmup_epochs: 20

output:
  out_path: "results/anchorformer"
