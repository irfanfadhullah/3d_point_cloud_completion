# PoinTr Model Configuration
_base_: default.yaml

model:
  name: "PoinTr"
  config:
    trans_dim: 384
    knn_layer: 1
    num_pred: 6144
    num_query: 96

dataset:
  train: "ShapeNet"
  test: "ShapeNet"

train:
  batch_size: 16
  n_epochs: 400
  learning_rate: 0.001
  lr_decay: 150
  warmup_epochs: 20

output:
  out_path: "results/pointr"
