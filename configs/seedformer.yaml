# SeedFormer Model Configuration
_base_: default.yaml

model:
  name: "SeedFormer"
  config:
    feat_dim: 512
    embed_dim: 128
    num_p0: 512
    n_knn: 20
    radius: 1
    up_factors: [1, 2, 2]
    seed_factor: 2
    interpolate: "three"
    attn_channel: true

dataset:
  train: "ShapeNet"
  test: "ShapeNet"

train:
  batch_size: 16
  n_epochs: 400
  learning_rate: 0.001
  lr_decay: 150
  warmup_epochs: 20

output:
  out_path: "results/seedformer"


# Mixed Precision Compatibility
amp_fp16: true  # All ops support half precision; AMP training possible
