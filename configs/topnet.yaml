# TopNet Model Configuration
_base_: default.yaml

model:
  name: "TopNet"
  config:
    node_feature: 8
    encoder_feature: 1024
    nlevels: 8
    num_pred: 2048

dataset:
  train: "ShapeNet"
  test: "ShapeNet"

train:
  batch_size: 32
  n_epochs: 400
  learning_rate: 0.001
  lr_decay: 150
  warmup_epochs: 20

output:
  out_path: "results/topnet"
