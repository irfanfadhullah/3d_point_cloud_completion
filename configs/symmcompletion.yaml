# SymmCompletion Model Configuration
_base_: default.yaml

model:
  name: "SymmCompletion"
  config:
    up_factors: "2,2,2"
    include_input: true

dataset:
  train: "ShapeNet"
  test: "ShapeNet"

train:
  batch_size: 16
  n_epochs: 400
  learning_rate: 0.001
  lr_decay: 150
  warmup_epochs: 20

output:
  out_path: "results/symmcompletion"
