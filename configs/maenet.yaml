_base_: default.yaml

model:
  name: MAENet
  config:
    num_pred: 16384
    use_image: true  # requires ViPC-style dataset with images

dataset:
  name: ViPC

train:
  epochs: 300
  lr: 0.0002
  batch_size: 16
  scheduler: step
  step_size: 50
  gamma: 0.7

output_path: results/maenet


# Mixed Precision Compatibility
amp_fp16: false  # CUDA extensions do not support half precision; use fp32
